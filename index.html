<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Subscriptions Store - Images Added</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* المتغيرات الأساسية للألوان - تتغير ديناميكياً عبر الجافاسكريبت */
        :root {
            --primary-color: #00f0ff; /* اللون الافتراضي (سيان) */
            --bg-color: #0a0b10;
            --card-bg: #121420;
            --text-color: #ffffff;
            --text-muted: #8a8d98;
            --transition: all 0.4s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: var(--transition);
            padding-bottom: 60px;
        }

        /* الهيدر والتحكم باللغات */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(18, 20, 32, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: var(--primary-color);
            transition: var(--transition);
        }

        .lang-switcher select {
            background: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--primary-color);
            padding: 5px 10px;
            border-radius: 5px;
            outline: none;
            cursor: pointer;
        }

        /* شريط التصنيفات (تغيير الألوان عند الاختيار) */
        .categories-bar {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 20px;
            overflow-x: auto;
        }

        .category-btn {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-color);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            white-space: nowrap;
            transition: var(--transition);
            font-weight: 600;
        }

        /* ألوان مخصصة لكل زر عند التفعيل لتوجيه هوية الموقع */
        .category-btn.active[data-cat="all"] { border-color: #00f0ff; background: rgba(0, 240, 255, 0.1); }
        .category-btn.active[data-cat="gamepass"] { border-color: #107c10; background: rgba(16, 124, 16, 0.1); }
        .category-btn.active[data-cat="netflix"] { border-color: #e50914; background: rgba(229, 9, 20, 0.1); }
        .category-btn.active[data-cat="playstation"] { border-color: #00439c; background: rgba(0, 67, 156, 0.1); }
        .category-btn.active[data-cat="iptv"] { border-color: #ff9900; background: rgba(255, 153, 0, 0.1); }

        /* شبكة المنتجات */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: var(--transition);
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        /* تنسيق عنصر الصورة الجديد */
        .product-img-element {
            width: 100%;
            height: 180px; /* الارتفاع الثابت للصورة */
            object-fit: cover; /* لضمان ملء الصورة للحاوية دون تشويه */
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .product-info {
            padding: 20px;
        }

        .product-title {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .product-price {
            font-size: 20px;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 15px;
            transition: var(--transition);
        }

        .buy-btn {
            display: block;
            width: 100%;
            background: var(--primary-color);
            color: #000;
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: var(--transition);
        }

        .buy-btn:hover {
            opacity: 0.9;
        }

        /* نافذة الشراء المنبثقة (Modal) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center; align-items: center;
            z-index: 2000;
            padding: 20px;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--primary-color);
            text-align: center;
        }

        .modal-content input {
            width: 100%;
            padding: 10px;
            margin: 15px 0;
            background: #1a1d2e;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            border-radius: 5px;
            text-align: center;
        }

        .modal-btns {
            display: flex;
            gap: 10px;
        }

        .confirm-btn { background: #25D366; color: white; flex: 1; padding: 10px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer;}
        .close-btn { background: #333; color: white; padding: 10px; border-radius: 5px; border: none; cursor: pointer;}
    </style>
</head>
<body>

    <header>
        <div class="logo" id="logoText">DIGITAL STORE</div>
        <div class="lang-switcher">
            <select id="langSelect" onchange="changeLanguage(this.value)">
                <option value="ar">العربية</option>
                <option value="en">English</option>
                <option value="fr">Français</option>
            </select>
        </div>
    </header>

    <div class="categories-bar">
        <button class="category-btn active" data-cat="all" onclick="filterCategory('all', '#00f0ff')">الكل / All</button>
        <button class="category-btn" data-cat="gamepass" onclick="filterCategory('gamepass', '#107c10')">Game Pass</button>
        <button class="category-btn" data-cat="netflix" onclick="filterCategory('netflix', '#e50914')">Netflix</button>
        <button class="category-btn" data-cat="playstation" onclick="filterCategory('playstation', '#00439c')">PlayStation</button>
        <button class="category-btn" data-cat="iptv" onclick="filterCategory('iptv', '#ff9900')">IPTV</button>
    </div>

    <div class="products-grid" id="productsGrid">
        
        <div class="product-card" data-item-cat="gamepass">
            <img src="https://placehold.co/600x400?text=Xbox+Game+Pass" alt="Xbox Game Pass Ultimate" class="product-img-element">
            <div class="product-info">
                <div class="product-title" data-key="gp_title">Xbox Game Pass Ultimate</div>
                <div class="product-price">00.00 DZD</div>
                <a href="#" class="buy-btn" data-key="buy_now" onclick="openOrderModal('Xbox Game Pass Ultimate', '00.00 DZD')">شراء الآن</a>
            </div>
        </div>

        <div class="product-card" data-item-cat="netflix">
            <img src="https://placehold.co/600x400?text=Netflix+Subscription" alt="Netflix Premium 1 Month" class="product-img-element">
            <div class="product-info">
                <div class="product-title" data-key="nf_title">Netflix Premium 1 Month</div>
                <div class="product-price">00.00 DZD</div>
                <a href="#" class="buy-btn" data-key="buy_now" onclick="openOrderModal('Netflix Premium 1 Month', '00.00 DZD')">شراء الآن</a>
            </div>
        </div>

        <div class="product-card" data-item-cat="playstation">
            <img src="https://placehold.co/600x400?text=PlayStation+Plus" alt="PlayStation Plus Essential" class="product-img-element">
            <div class="product-info">
                <div class="product-title" data-key="ps_title">PlayStation Plus Essential</div>
                <div class="product-price">00.00 DZD</div>
                <a href="#" class="buy-btn" data-key="buy_now" onclick="openOrderModal('PlayStation Plus Essential', '00.00 DZD')">شراء الآن</a>
            </div>
        </div>

        <div class="product-card" data-item-cat="iptv">
            <img src="https://placehold.co/600x400?text=IPTV+Service" alt="IPTV Premium 1 Year" class="product-img-element">
            <div class="product-info">
                <div class="product-title" data-key="iptv_title">IPTV Premium 1 Year</div>
                <div class="product-price">00.00 DZD</div>
                <a href="#" class="buy-btn" data-key="buy_now" onclick="openOrderModal('IPTV Premium 1 Year', '00.00 DZD')">شراء الآن</a>
            </div>
        </div>

    </div>

    <div class="modal" id="orderModal">
        <div class="modal-content">
            <h3 id="modalTitle">تأكيد الطلب</h3>
            <input type="text" id="clientName" placeholder="اكتب اسمك هنا / Enter Your Name">
            <div class="modal-btns">
                <button class="confirm-btn" onclick="sendToWhatsApp()"><i class="fab fa-whatsapp"></i> إرسال عبر واتساب</button>
                <button class="close-btn" onclick="closeModal()">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        // قاموس اللغات الثلاث للموقع
        const i18n = {
            ar: {
                logo: "متجر الاشتراكات",
                buy_now: "شراء الآن",
                gp_title: "إكس بوكس جيم باس ألتيميت",
                nf_title: "نتفليكس بريميوم 1 شهر",
                ps_title: "بلايستيشن بلاس الأساسية",
                iptv_title: "اشتراك IPTV متميز 1 سنة",
                modal_head: "تأكيد طلبك",
                name_holder: "اكتب اسمك هنا للاتصال بك"
            },
            en: {
                logo: "DIGITAL STORE",
                buy_now: "Buy Now",
                gp_title: "Xbox Game Pass Ultimate",
                nf_title: "Netflix Premium 1 Month",
                ps_title: "PlayStation Plus Essential",
                iptv_title: "IPTV Premium 1 Year",
                modal_head: "Confirm Your Order",
                name_holder: "Enter your name here"
            },
            fr: {
                logo: "BOUTIQUE DIGITALE",
                buy_now: "Acheter",
                gp_title: "Xbox Game Pass Ultimate",
                nf_title: "Netflix Premium 1 Mois",
                ps_title: "PlayStation Plus Essential",
                iptv_title: "IPTV Premium 1 An",
                modal_head: "Confirmez Votre Commande",
                name_holder: "Entrez votre nom ici"
            }
        };

        let currentProduct = "";
        let currentPrice = "";
        // ضع رقم الواتساب الخاص بك هنا كاملاً مع رمز الدولة (بدون علامة + أو أصفار إضافية)
        const myWhatsAppNumber = "213554039356"; 

        // دالة تغيير اللغة
        function changeLanguage(lang) {
            document.documentElement.lang = lang;
            document.documentElement.dir = (lang === 'ar') ? 'rtl' : 'ltr';
            
            document.getElementById('logoText').innerText = i18n[lang].logo;
            document.getElementById('modalTitle').innerText = i18n[lang].modal_head;
            document.getElementById('clientName').placeholder = i18n[lang].name_holder;

            document.querySelectorAll('[data-key]').forEach(element => {
                const key = element.getAttribute('data-key');
                if(i18n[lang][key]) {
                    element.innerText = i18n[lang][key];
                }
            });
        }

        // دالة تصفية المنتجات وتغيير هوية لون الموقع ديناميكياً
        function filterCategory(category, colorCode) {
            // تغيير ألوان الموقع بناء على المنتج المحدد
            document.documentElement.style.setProperty('--primary-color', colorCode);

            // تفعيل الزر المختار بأسلوب بصري مخصص
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.getAttribute('data-cat') === category) {
                    btn.classList.add('active');
                }
            });

            // إخفاء وإظهار المنتجات حسب التصنيف الفعلي
            document.querySelectorAll('.product-card').forEach(card => {
                if (category === 'all' || card.getAttribute('data-item-cat') === category) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        // إدارة نافذة الشراء والواتساب
        function openOrderModal(product, price) {
            currentProduct = product;
            currentPrice = price;
            document.getElementById('orderModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('orderModal').style.display = 'none';
        }

        function sendToWhatsApp() {
            const name = document.getElementById('clientName').value.trim();
            if(!name) {
                alert("الرجاء إدخال اسمك أولاً / Please enter your name");
                return;
            }
            
            // صياغة الرسالة التلقائية التي ستصلك على الواتساب
            const message = `مرحباً، أود شراء اشتراك:\n🎁 المنتج: ${currentProduct}\n💰 السعر: ${currentPrice}\n👤 الاسم: ${name}`;
            const encodedMessage = encodeURIComponent(message);
            
            // فتح الواتساب
            window.open(`https://wa.me/${myWhatsAppNumber}?text=${encodedMessage}`, '_blank');
            closeModal();
        }
    </script>
</body>
</html>
